- name: Install nginx 
  apt:
    update-cache: false
    name: nginx
    state: latest

- name: Copy nginx conf 
  template:
    src: 'site.conf.j2'
    dest: '/etc/nginx/conf.d/site-{{ item }}.conf'
    owner: root
    group: root
    mode: '0644'
  loop: '{{ sites }}'
  notify: restart nginx

- name: Create sites folders
  file:
    path: '/var/www/{{ item }}/'
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: '{{ sites }}'

- name: Copy index
  template:
    src: 'index.html.j2'
    dest: '/var/www/{{ item }}/index.html'
    owner: root
    group: root
    mode: '0644

